<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .accent { fill: #b23e22; }
    .paper { fill: #ffffff; stroke: #dccfb2; }
    .ink { fill: #1c1712; }
    .letter { fill: #1c1712; }
    @media (prefers-color-scheme: dark) {
      .accent { fill: #ea7e4c; }
      .paper { fill: #251e15; stroke: #4a3d28; }
      .ink { fill: #f1e7d7; }
      .letter { fill: #f1e7d7; }
    }
  </style>
  <rect x="6" y="6" width="26" height="26" rx="4" class="accent" />
  <rect x="35" y="6" width="26" height="26" rx="4" class="paper" />
  <rect x="6" y="35" width="26" height="26" rx="4" class="ink" />
  <text x="48" y="27" text-anchor="middle" dominant-baseline="central"
    font-family="Georgia, serif" font-weight="600" font-size="20" class="letter">H</text>
</svg>
